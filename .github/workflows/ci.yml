name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown
        run: npx --yes markdownlint-cli2 "**/*.md"

  go:
    name: go build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - labs/02-grpc-control-plane/control-plane
          - labs/03-pod-to-pod-kind/control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: build and vet
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go vet ./...
