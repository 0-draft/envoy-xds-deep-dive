# Lab 02 — Envoy + a real gRPC control plane + two upstreams.
#
#   curl :10000     -> envoy -> EDS endpoints { 10.78.0.11, 10.78.0.12 }
#   control plane   :18000 (ADS gRPC, internal)  :19000 (HTTP admin, exposed)
#
# Drive it:
#   curl -XPOST localhost:19000/scale?n=1   # shrink EDS to one endpoint
#   curl -XPOST localhost:19000/break       # push bad listener -> watch NACK
#   curl -XPOST localhost:19000/heal        # push valid listener -> ACK
services:
  control-plane:
    build: ./control-plane
    ports:
      - "19000:19000"   # HTTP admin (ADS :18000 stays internal)
    networks:
      lab:
        ipv4_address: 10.78.0.5

  envoy:
    image: envoyproxy/envoy:v1.38.1
    command: ["-c", "/etc/envoy/bootstrap.yaml", "-l", "info"]
    volumes:
      - ./bootstrap.yaml:/etc/envoy/bootstrap.yaml:ro
    ports:
      - "10000:10000"
      - "9901:9901"
    depends_on:
      - control-plane
    networks:
      lab:
        ipv4_address: 10.78.0.2

  upstream1:
    image: hashicorp/http-echo:1.0.0
    command: ["-text=hello from upstream1", "-listen=:5678"]
    networks:
      lab:
        ipv4_address: 10.78.0.11

  upstream2:
    image: hashicorp/http-echo:1.0.0
    command: ["-text=hello from upstream2", "-listen=:5678"]
    networks:
      lab:
        ipv4_address: 10.78.0.12

networks:
  lab:
    ipam:
      config:
        - subnet: 10.78.0.0/24
