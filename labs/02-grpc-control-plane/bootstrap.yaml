# Lab 02 — Envoy driven by a real gRPC control plane over ADS.
#
# The ONLY thing statically configured is how to reach the control plane
# (the `xds_cluster`). Everything else — listeners, routes, clusters, endpoints —
# arrives dynamically over a single Aggregated Discovery Service (ADS) stream.
#
#   node.id MUST equal the id the control plane snapshots for ("lab02-node").

node:
  id: lab02-node
  cluster: lab02-cluster

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

dynamic_resources:
  # One ADS stream carries LDS+RDS+CDS+EDS, in dependency order. This ordering
  # guarantee (CDS before EDS, LDS before RDS) is the reason to prefer ADS.
  ads_config:
    api_type: GRPC
    transport_api_version: V3
    grpc_services:
      - envoy_grpc:
          cluster_name: xds_cluster

  # "Discover listeners/clusters via ADS" (empty `ads: {}` = use the stream above).
  lds_config:
    resource_api_version: V3
    ads: {}
  cds_config:
    resource_api_version: V3
    ads: {}

static_resources:
  clusters:
    # The bootstrap cluster pointing at the control plane. xDS is gRPC, so this
    # must speak HTTP/2 (see typed_extension_protocol_options below).
    - name: xds_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: xds_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: control-plane   # docker-compose service name
                      port_value: 18000
