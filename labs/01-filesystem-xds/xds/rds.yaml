# RDS resource file — a RouteConfiguration named "local_route".
#
# The Listener (lds.yaml) asked for exactly this name. Edit the routing here
# and Envoy hot-reloads it without dropping the Listener — this is why RDS is
# split out from LDS: you can reshape routing without rebuilding listeners.
resources:
  - "@type": type.googleapis.com/envoy.config.route.v3.RouteConfiguration
    name: local_route
    virtual_hosts:
      - name: backend
        domains: ["*"]
        routes:
          - match:
              prefix: "/"
            route:
              cluster: service_backend   # references a Cluster (cds.yaml) by name
