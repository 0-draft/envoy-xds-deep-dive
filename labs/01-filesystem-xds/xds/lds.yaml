# LDS resource file — served to Envoy as a list of Listener resources.
#
# Note the HCM does NOT inline its route_config anymore. It uses `rds:` to
# point at a RouteConfiguration named "local_route", discovered from rds.yaml.
# That is the LDS -> RDS hand-off.
resources:
  - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
    name: listener_http
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 10000
    filter_chains:
      - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              rds:
                route_config_name: local_route
                config_source:
                  resource_api_version: V3
                  path_config_source:
                    path: /etc/envoy/xds/rds.yaml
                    watched_directory:
                      path: /etc/envoy/xds
              http_filters:
                - name: envoy.filters.http.router
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
