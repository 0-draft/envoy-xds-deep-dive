# Lab 00 — fully static Envoy bootstrap.
#
# Everything Envoy needs is in this one file under `static_resources`.
# No control plane, no xDS. This is the baseline you will later "dissolve"
# into LDS/RDS/CDS/EDS in the following labs.
#
# Data path:  curl :10000  ->  listener  ->  HCM + router  ->  route  ->  cluster  ->  endpoint (http-echo :5678)

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  # ---- LISTENERS (this is what LDS will later serve dynamically) ----
  listeners:
    - name: listener_http            # <- a Listener resource
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                # ---- ROUTE CONFIG (this is what RDS will later serve dynamically) ----
                route_config:
                  name: local_route   # <- a RouteConfiguration resource
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: service_backend   # <- references a Cluster by name
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  # ---- CLUSTERS (this is what CDS will later serve dynamically) ----
  clusters:
    - name: service_backend          # <- a Cluster resource
      type: STRICT_DNS               # resolve endpoints from DNS (Docker service name)
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      # ---- LOAD ASSIGNMENT (this is what EDS will later serve dynamically) ----
      load_assignment:
        cluster_name: service_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: upstream   # docker-compose service name
                      port_value: 5678    # <- an Endpoint
